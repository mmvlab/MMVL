<!DOCTYPE html>
<html lang="en">

<head>
  <meta name="view-transition" content="same-origin">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MMVL Lab — Team</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="./assets/css/navbar.css">
  <link rel="stylesheet" href="./assets/css/footer.css">
  <!-- team styles are inline below -->
  <link rel="stylesheet" href="./assets/css/scroll-reveal.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --page-bg: #f8fafc;
      --bg: var(--page-bg);
      --card-bg: rgba(255, 255, 255, 0.7);
      --card: var(--card-bg);
      --muted: #64748b;
      --accent: #4f46e5;
      --accent-hover: #4338ca;
      --border: rgba(255, 255, 255, 0.6);
      --text: #0f172a;
      --card-border-light: rgba(255, 255, 255, 0.8);
      --card-elev: rgba(0, 0, 0, 0.04);
      --nav-h: 72px;
      --nav-bg: #4f46e5;
    }

    body {
      margin: 0;
      background: var(--page-bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      line-height: 1.55;
      box-sizing: border-box;
      width: 100%;
      height: 100%;
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    .lab-title,
    .section-title,
    .page-title {
      font-family: 'Outfit', sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 15% 50%, rgba(79, 70, 229, 0.12), transparent 50%),
        radial-gradient(circle at 85% 30%, rgba(16, 185, 129, 0.12), transparent 50%),
        radial-gradient(circle at 50% 80%, rgba(236, 72, 153, 0.12), transparent 50%);
      background-color: #f8fafc;
      z-index: -1;
      animation: breathe 15s alternate infinite ease-in-out;
    }

    @keyframes breathe {
      0% {
        transform: scale(1);
      }

      100% {
        transform: scale(1.05);
      }
    }



    .container-team {
      max-width: 1200px;
      width: 90%;
      margin: 0 auto;
      padding: 40px 20px;
      margin-top: 72px;
    }

    a {
      color: var(--accent);
      font-weight: 600;
      text-decoration: none;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 26px;
    }

    .lab-title {
      font-size: 22px;
      font-weight: 800;
    }

    .subtitle {
      color: var(--muted);
      font-size: 18px;
      font-weight: 800;
    }

    .section-title {
      margin: 36px 0 14px 0;
      font-size: 20px;
      font-weight: 800;
      border-left: 5px solid var(--accent);
      padding-left: 10px;
    }

    /* SUPERVISOR */
    .supervisor {
      display: flex;
      gap: 20px;
      background: var(--card);
      padding: 22px;
      border-radius: 14px;
      border: 1px solid var(--border);
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.08);

      transition: transform 0.25s ease, box-shadow 0.25s ease,
        border-color 0.25s ease;

      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .supervisor:hover {
      transform: translateY(-6px);
      box-shadow: 0 14px 36px rgba(79, 70, 229, 0.15);
      border-color: rgba(79, 70, 229, 0.6);
      /* bluish border */
    }

    .supervisor:hover .profile-img-wrap {
      border-color: rgba(79, 70, 229, 0.6);
    }

    /* GRID CARDS */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    .grid-mtech {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }

    .joined {
      margin-top: 4px;
      font-size: 12.5px;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .card {
      background: var(--card);
      padding: 14px;
      border-radius: 14px;
      border: 1px solid var(--border);
      box-shadow:
        0 8px 20px rgba(0, 0, 0, 0.08),
        0 2px 6px rgba(0, 0, 0, 0.05);
      display: flex;
      flex-direction: column;

      border: 1.5px solid var(--border);
      transition: transform 0.25s ease, box-shadow 0.25s ease,
        border-color 0.25s ease;

      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow:
        0 14px 30px rgba(0, 0, 0, 0.12),
        0 4px 10px rgba(0, 0, 0, 0.08);
      border-color: rgba(79, 70, 229, 0.6);
      /* bluish border */
    }

    .card:hover .profile-img-wrap {
      border-color: rgba(79, 70, 229, 0.6);
    }

    .name {
      font-weight: 800;
      font-size: 16px;
    }

    .degree-badge {
      display: inline-block;
      align-self: flex-start;
      font-size: 11.5px;
      font-weight: 700;
      color: #3730a3;
      background: rgba(79, 70, 229, 0.08);
      border: 1px solid rgba(79, 70, 229, 0.18);
      border-radius: 999px;
      padding: 2px 10px;
      margin: 3px 0 4px;
    }

    .role {
      color: var(--muted);
      font-size: 14px;
    }

    /* ICONS */
    .icon-row {
      display: flex;
      gap: 12px;
      margin-top: auto;
      padding-top: 10px;
    }

    .icon-row a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 6px;
      border-radius: 8px;
      transition: background 0.2s ease;
    }

    .icon-row a:hover {
      background: rgba(79, 70, 229, 0.08);
      /* soft blue wash */
    }

    .icon-row a:hover .icon {
      fill: var(--accent);
      /* brighter blue on hover */
      opacity: 1;
      transform: translateY(-1px);
    }

    .icon-row a:focus-visible {
      outline: 2px solid rgba(79, 70, 229, 0.35);
      outline-offset: 2px;
    }

    .icon {
      /* width: 18px;
        height: 18px;
        fill: var(--muted);
        cursor: pointer; */

      width: 18px;
      height: 18px;
      fill: currentColor;
      color: var(--accent);
      /* deep academic blue */
      opacity: 0.9;
      transition: fill 0.2s ease, transform 0.2s ease, opacity 0.2s ease;
    }

    .icon:hover {
      fill: var(--accent);
    }

    .icon.website-icon {
      fill: none;
      stroke: var(--accent);
      stroke-width: 1.8px;
      opacity: 0.9;
    }

    .icon-row a:hover .icon.website-icon {
      fill: none;
      stroke: var(--accent);
      opacity: 1;
    }

    /* LIST (MTECH / BTECH) */
    .list-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.06);
    }

    .list-item {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }

    .list-item:last-child {
      border-bottom: none;
    }

    .list-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid var(--border);
    }

    .list-name {
      font-weight: 700;
    }

    .list-role {
      color: var(--muted);
      font-size: 14px;
      text-align: right;
    }

    /* BTECH TWO-COLUMN GRID */
    .btech-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    .btech-cell {
      background: var(--card);
      border-radius: 12px;
      border: 1.5px solid var(--border);
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.06);
      padding: 14px 18px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
    }

    .btech-cell:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.10);
      border-color: rgba(79, 70, 229, 0.5);
    }

    .btech-cell-name {
      font-weight: 700;
      font-size: 14px;
      color: var(--text);
    }

    .btech-cell-dept {
      font-weight: 600;
      font-size: 12px;
      color: var(--accent);
      background: rgba(79, 70, 229, 0.08);
      border-radius: 6px;
      padding: 1px 7px;
      align-self: flex-start;
    }

    .btech-cell-project {
      font-size: 12.5px;
      color: var(--muted);
    }

    .btech-cell-joined {
      font-weight: 600;
      font-size: 12.5px;
      color: var(--accent);
    }



    /* ROUND PROFILE IMAGES (Supervisor / PhD / Associates) */
    .profile-img-wrap {
      width: 140px;
      height: 140px;
      min-width: 140px;
      min-height: 140px;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid transparent;
      background: #fff;
      flex-shrink: 0;
      transition: border-color 0.35s ease;
    }

    .profile-img-wrap:hover {
      border-color: rgba(79, 70, 229, 0.7);
    }

    .profile-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.35s ease;
    }

    .profile-img-wrap:hover .profile-img {
      transform: scale(1.12);
    }

    /* Card profile image (centered) */
    .card .profile-img-wrap {
      margin: 0 auto 10px auto;
    }

    /* Supervisor image slightly bigger */
    .supervisor .profile-img-wrap {
      width: 220px;
      height: 220px;
      min-width: 220px;
      min-height: 220px;
    }

    .supervisor .profile-img {
      object-position: top center;
    }

    /* M.Tech small avatar */
    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      border: 1.5px solid var(--border);
    }

    /* ===== RESPONSIVE ===== */

    /* ---------- TABLET LANDSCAPE / SMALL LAPTOP (≤1024px) ---------- */
    @media (max-width: 1024px) {
      .container-team {
        width: 94%;
        padding: 32px 16px;
      }

      .lab-title {
        font-size: 20px;
      }

      .subtitle {
        font-size: 16px;
      }

      .section-title {
        font-size: 18px;
        margin: 28px 0 12px 0;
      }

      .grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 14px;
      }

      .grid-mtech {
        grid-template-columns: repeat(3, 1fr);
        gap: 14px;
      }

      .profile-img-wrap {
        width: 120px;
        height: 120px;
        min-width: 120px;
        min-height: 120px;
      }

      .supervisor .profile-img-wrap {
        width: 180px;
        height: 180px;
        min-width: 180px;
        min-height: 180px;
      }

      .name {
        font-size: 15px;
      }

      .role {
        font-size: 13px;
      }

      .joined {
        font-size: 12px;
      }

      .supervisor h2 {
        font-size: 20px;
      }

      .supervisor .role {
        font-size: 13px;
      }

      .supervisor p {
        font-size: 13px;
      }
    }

    /* ---------- TABLET PORTRAIT (≤768px) ---------- */
    @media (max-width: 768px) {
      .container-team {
        width: 96%;
        padding: 24px 12px;
        margin-top: 64px;
      }

      .lab-title {
        font-size: 18px;
      }

      .subtitle {
        font-size: 15px;
      }

      .section-title {
        font-size: 17px;
        margin: 24px 0 10px 0;
      }

      .grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }

      .grid-mtech {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }

      .profile-img-wrap {
        width: 100px;
        height: 100px;
        min-width: 100px;
        min-height: 100px;
      }

      .supervisor .profile-img-wrap {
        width: 160px;
        height: 160px;
        min-width: 160px;
        min-height: 160px;
      }

      .supervisor {
        flex-direction: column;
        align-items: center;
        text-align: center;
        padding: 18px;
        gap: 14px;
      }

      .supervisor h2 {
        font-size: 19px;
      }

      .supervisor p {
        font-size: 12.5px;
      }

      .supervisor .icon-row {
        justify-content: center;
      }

      .card {
        padding: 12px;
        border-radius: 12px;
      }

      .name {
        font-size: 14px;
      }

      .role {
        font-size: 12.5px;
      }

      .joined {
        font-size: 11.5px;
      }

      .icon {
        width: 16px;
        height: 16px;
      }

      .icon-row {
        gap: 10px;
        margin-top: 6px;
      }

      /* BTech grid */
      .btech-grid {
        gap: 12px;
      }

      .btech-cell {
        padding: 12px 16px;
      }

      .btech-cell-name {
        font-size: 13px;
      }

      .btech-cell-joined {
        font-size: 12px;
      }
    }

    /* ---------- MOBILE (≤520px) ---------- */
    @media (max-width: 520px) {
      .container-team {
        width: 100%;
        padding: 18px 14px;
        margin-top: 56px;
      }

      .lab-title {
        font-size: 16px;
      }

      .subtitle {
        font-size: 13px;
      }

      .section-title {
        font-size: 15px;
        margin: 20px 0 8px 0;
        border-left-width: 4px;
        padding-left: 8px;
      }

      .grid {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .grid-mtech {
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
      }

      .profile-img-wrap {
        width: 80px;
        height: 80px;
        min-width: 80px;
        min-height: 80px;
        border-width: 1.5px;
      }

      .supervisor .profile-img-wrap {
        width: 120px;
        height: 120px;
        min-width: 120px;
        min-height: 120px;
      }

      .supervisor {
        flex-direction: column;
        align-items: center;
        text-align: center;
        padding: 16px 14px;
        gap: 10px;
        border-radius: 12px;
      }

      .supervisor h2 {
        font-size: 17px;
      }

      .supervisor .role {
        font-size: 12px;
      }

      .supervisor p {
        font-size: 11.5px;
        line-height: 1.5;
      }

      .supervisor .icon-row {
        justify-content: center;
      }

      .card {
        padding: 10px;
        border-radius: 10px;
      }

      .card .profile-img-wrap {
        margin-bottom: 8px;
      }

      .name {
        font-size: 13px;
      }

      .role {
        font-size: 11.5px;
      }

      .joined {
        font-size: 11px;
      }

      .icon {
        width: 15px;
        height: 15px;
      }

      .icon-row {
        gap: 8px;
        margin-top: 5px;
      }

      .icon-row a {
        padding: 5px;
        border-radius: 6px;
      }

      .list-item {
        flex-direction: column;
      }

      .list-role {
        text-align: left;
        font-size: 12px;
      }

      /* BTech grid stacks on mobile */
      .btech-grid {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .btech-cell {
        padding: 10px 14px;
        border-radius: 10px;
      }

      .btech-cell-name {
        font-size: 13px;
      }

      .btech-cell-joined {
        font-size: 11.5px;
      }
    }

    /* ---------- VERY SMALL MOBILE (≤380px) ---------- */
    @media (max-width: 380px) {
      .grid-mtech {
        grid-template-columns: 1fr;
      }

      .profile-img-wrap {
        width: 70px;
        height: 70px;
        min-width: 70px;
        min-height: 70px;
      }

      .supervisor .profile-img-wrap {
        width: 100px;
        height: 100px;
        min-width: 100px;
        min-height: 100px;
      }

      .lab-title {
        font-size: 15px;
      }

      .supervisor h2 {
        font-size: 16px;
      }

      .card {
        padding: 8px;
      }

      .name {
        font-size: 12.5px;
      }

      .role {
        font-size: 11px;
      }
    }




    /* Page Load Fade-Up Animation */
    #app-content {
      animation: fadeUpIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
      -webkit-animation: fadeUpIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes fadeUpIn {
      from {
        opacity: 0;
        transform: translateY(40px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Smooth View Transitions */
    html {
      overflow-y: scroll;
    }

    @view-transition {
      navigation: auto;
    }
  </style>
</head>
