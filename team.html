<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>MMVL Lab — Team</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="./assets/css/navbar.css">
    <link rel="stylesheet" href="./assets/css/footer.css">
    <link rel="stylesheet" href="./assets/css/team.css">
<style>
  :root {
    --bg: #f1f3f6;
    --card: #f9fbff;
    --text: #111827;
    --muted: #4b5563;
    --accent: #0e38f1;
    --border: #d1d5db;
}

body {
    margin: 0;
    color: var(--text);
    font-family: Inter, system-ui, Arial;
    line-height: 1.55;
    box-sizing: border-box;
    width: 100%;
    height: 100%;


}



.container-team {
    max-width: 75%;
    margin: 20px auto;
    padding: 20px;
    margin-top: 72px;
}

a {
    color: var(--accent);
    font-weight: 600;
    text-decoration: none;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 26px;
}

.lab-title {
    font-size: 22px;
    font-weight: 800;
}

.subtitle {
    color: var(--muted);
    font-size: 18px;
    font-weight: 800;
}

.section-title {
    margin: 36px 0 14px 0;
    font-size: 20px;
    font-weight: 800;
    border-left: 5px solid var(--accent);
    padding-left: 10px;
}

/* SUPERVISOR */
.supervisor {
    display: flex;
    gap: 20px;
    background: var(--card);
    padding: 22px;
    border-radius: 14px;
    border: 1px solid var(--border);
    box-shadow: 0 10px 28px rgba(0, 0, 0, 0.08);

    transition: transform 0.25s ease, box-shadow 0.25s ease,
        border-color 0.25s ease;
}

.supervisor:hover {
    transform: translateY(-6px);
    box-shadow: 0 14px 36px rgba(14, 56, 241, 0.18);
    border-color: rgba(14, 56, 241, 0.7);
    /* bluish border */
}

.supervisor:hover .profile-img {
    border-color: rgba(14, 56, 241, 0.7);
}

/* GRID CARDS */
.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
}
.grid-mtech {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
}

.joined {
    margin-top: 4px;
    font-size: 12.5px;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 6px;
}

.card {
    background: var(--card);
    padding: 14px;
    border-radius: 14px;
    border: 1px solid var(--border);
     box-shadow:
    0 8px 20px rgba(0,0,0,0.08),
    0 2px 6px rgba(0,0,0,0.05);
    display: flex;
    flex-direction: column;

    border: 1.5px solid var(--border);
    transition: transform 0.25s ease, box-shadow 0.25s ease,
        border-color 0.25s ease;
}

.card:hover {
    transform: translateY(-6px);
     box-shadow:
    0 14px 30px rgba(0,0,0,0.12),
    0 4px 10px rgba(0,0,0,0.08);
    border-color: rgba(14, 56, 241, 0.7);
    /* bluish border */
}

.card:hover .profile-img {
    border-color: rgba(14, 56, 241, 0.7);
}

.name {
    font-weight: 800;
    font-size: 16px;
}

.role {
    color: var(--muted);
    font-size: 14px;
}

/* ICONS */
.icon-row {
    display: flex;
    gap: 12px;
    margin-top: 8px;
}

.icon-row a {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 6px;
    border-radius: 8px;
    transition: background 0.2s ease;
}

.icon-row a:hover {
    background: rgba(30, 64, 175, 0.12);
    /* soft blue wash */
}

.icon-row a:hover .icon {
    fill: #0e38f1;
    /* brighter blue on hover */
    opacity: 1;
    transform: translateY(-1px);
}

.icon-row a:focus-visible {
    outline: 2px solid rgba(14, 56, 241, 0.35);
    outline-offset: 2px;
}

.icon {
    /* width: 18px;
        height: 18px;
        fill: var(--muted);
        cursor: pointer; */

    width: 18px;
    height: 18px;
    fill: currentColor;
    color: #1e40af;
    /* deep academic blue */
    opacity: 0.9;
    transition: fill 0.2s ease, transform 0.2s ease, opacity 0.2s ease;
}

.icon:hover {
    fill: var(--accent);
}

/* LIST (MTECH / BTECH) */
.list-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.06);
}

.list-item {
    display: flex;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
}

.list-item:last-child {
    border-bottom: none;
}

.list-left {
    display: flex;
    align-items: center;
    gap: 12px;
}

.avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    object-fit: cover;
    border: 1px solid var(--border);
}

.list-name {
    font-weight: 700;
}

.list-role {
    color: var(--muted);
    font-size: 14px;
    text-align: right;
}

/* ROUND PROFILE IMAGES (Supervisor / PhD / Associates) */
.profile-img {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--border);
    background: #fff;
}

/* Card profile image (centered) */
.card .profile-img {
    margin: 0 auto 10px auto;
    display: block;
}

/* Supervisor image slightly bigger */
.supervisor .profile-img {
    width: 220px;
    height: 220px;
}

/* M.Tech small avatar */
.avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    object-fit: cover;
    border: 1.5px solid var(--border);
}

/* RESPONSIVE */
@media (max-width: 800px) {
    .grid {
        grid-template-columns: repeat(2, 1fr);
    }

    .supervisor {
        flex-direction: column;
    }
}

@media (max-width: 520px) {
    .grid {
        grid-template-columns: 1fr;
    }

    .list-item {
        flex-direction: column;
    }

    .list-role {
        text-align: left;
    }
}
</style>
  </head>

  <body>
    <div id="navbar"></div>
    <div class="container-team">
      <!-- HEADER -->
      <div class="header">
        <div>
          <div class="lab-title">Machine & Medical Vision Lab</div>
          <div class="subtitle">Team</div>
        </div>
      </div>

<!-- SUPERVISOR -->
<div class="section-title">Supervisor</div>
<div id="supervisorBox"></div>

<!-- PHD -->
<div class="section-title">PhD Students</div>
<div class="grid" id="phdGrid"></div>

<!-- PROJECT ASSOCIATE -->
<div class="section-title">Project Associates</div>
<div class="grid" id="projectAssociateGrid"></div>

<!-- MTECH -->
<div class="section-title">M.Tech/ MS(Research) Students</div>
<div class="grid-mtech" id="mtechGrid"></div>


      <!-- BTECH -->
      <div class="section-title">B.Tech Students</div>
      <div class="list-card">
        <div class="list-item">
          <div class="list-name">Student X</div>
          <div class="list-role">Final Year Project — Posture Detection</div>
        </div>
      </div>
    </div>
   <div id="footer"></div>
    <!-- SVG ICONS -->
    <svg style="display: none">
      <symbol id="linkedin" viewBox="0 0 24 24">
        <path
          d="M4.98 3.5C4.98 4.88 3.87 6 2.5 6S0 4.88 0 3.5 1.12 1 2.5 1 4.98 2.12 4.98 3.5zM.22 23.5h4.56V7.98H.22zM8.22 7.98h4.38v2.12h.06c.61-1.16 2.1-2.38 4.32-2.38 4.62 0 5.48 3.04 5.48 6.99v8.79h-4.56v-7.8c0-1.86-.03-4.25-2.59-4.25-2.59 0-2.99 2.02-2.99 4.11v7.94H8.22z"
        />
      </symbol>
      <symbol id="mail" viewBox="0 0 24 24">
        <path d="M2 4h20v16H2z" />
        <path d="M22 4L12 13 2 4" fill="#fff" />
      </symbol>
      <symbol id="scholar" viewBox="0 0 24 24">
        <path d="M12 2L1 7l11 5 9-4.09V17h2V7z" />
        <path d="M5 10v4c0 2.21 3.13 4 7 4s7-1.79 7-4v-4l-7 3z" />
      </symbol>
    </svg>
    <script src="./data/team-data.js"></script>
<script src="./loaders/team-load.js"></script>

  </body>
  <script>
  fetch("navbar.html")
    .then(res => res.text())
    .then(data => document.getElementById("navbar").innerHTML = data);

  fetch("footer.html")
    .then(res => res.text())
    .then(data => document.getElementById("footer").innerHTML = data);
</script>
</html>
