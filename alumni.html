<!doctype html>
<html lang="en">

<head>
  <meta name="view-transition" content="same-origin">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MMVL Lab — Alumni</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="./assets/css/navbar.css">
  <link rel="stylesheet" href="./assets/css/footer.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet">

  <style>
    :root {
      --page-bg: #f8fafc;
      --card-bg: rgba(255, 255, 255, 0.7);
      --muted: #64748b;
      --accent: #4f46e5;
      --border: rgba(255, 255, 255, 0.6);
      --card-border-light: rgba(255, 255, 255, 0.8);
      --text: #0f172a;
      --nav-h: 72px;
    }

    body {
      margin: 0;
      background: var(--page-bg);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: #1e293b;
      padding-top: var(--nav-h);
      line-height: 1.55;
    }

    h1, h2, h3, .page-title, .section-title {
      font-family: 'Outfit', sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 15% 50%, rgba(79, 70, 229, 0.12), transparent 50%),
        radial-gradient(circle at 85% 30%, rgba(16, 185, 129, 0.12), transparent 50%),
        radial-gradient(circle at 50% 80%, rgba(236, 72, 153, 0.12), transparent 50%);
      background-color: #f8fafc;
      z-index: -1;
      animation: breathe 15s alternate infinite ease-in-out;
    }

    @keyframes breathe {
      0%   { transform: scale(1); }
      100% { transform: scale(1.05); }
    }

    .container-max {
      max-width: 1100px;
      width: 90%;
      margin: 0 auto;
      padding: 40px 20px 60px;
    }

    .page-head {
      margin: 28px 0 22px;
    }

    .page-title {
      font-size: 26px;
      font-weight: 900;
      margin: 0;
    }

    .page-subtitle {
      color: var(--muted);
      margin-top: 6px;
      font-size: 14px;
    }

    .section-title {
      font-weight: 900;
      font-size: 19px;
      margin: 32px 0 14px;
      border-left: 5px solid var(--accent);
      padding-left: 12px;
    }

    /* Alumni card grid */
    .alumni-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .alumni-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border-light);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      transition: 0.22s ease;
    }

    .alumni-card:hover {
      transform: translateY(-4px);
      border-color: rgba(79, 70, 229, 0.5);
      box-shadow: 0 16px 32px rgba(79, 70, 229, 0.10);
    }

    .alumni-name {
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 15px;
      color: #0f172a;
      margin: 0 0 4px;
    }

    .alumni-degree {
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      color: #3730a3;
      background: rgba(79, 70, 229, 0.08);
      border: 1px solid rgba(79, 70, 229, 0.18);
      border-radius: 999px;
      padding: 2px 10px;
      margin-bottom: 8px;
    }

    .alumni-year {
      font-size: 12.5px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .alumni-thesis {
      font-size: 13px;
      color: #374151;
      margin-bottom: 10px;
      line-height: 1.45;
    }

    .alumni-position {
      font-size: 12.5px;
      color: var(--muted);
      font-style: italic;
    }

    .alumni-icons {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    .alumni-icons a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: rgba(79, 70, 229, 0.07);
      border: 1px solid rgba(79, 70, 229, 0.15);
      transition: 0.18s ease;
    }

    .alumni-icons a:hover {
      background: rgba(79, 70, 229, 0.15);
      border-color: rgba(79, 70, 229, 0.4);
    }

    .alumni-icons svg {
      width: 15px;
      height: 15px;
      fill: var(--accent);
    }

    /* Btech alumni grid */
    .btech-alumni-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }

    .btech-alumni-cell {
      background: var(--card-bg);
      border: 1px solid var(--card-border-light);
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 6px 16px rgba(0,0,0,0.05);
      transition: 0.22s ease;
    }

    .btech-alumni-cell:hover {
      transform: translateY(-3px);
      border-color: rgba(79, 70, 229, 0.45);
      box-shadow: 0 12px 26px rgba(79,70,229,0.09);
    }

    .btech-alumni-name {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 14px;
      color: #0f172a;
    }

    .btech-alumni-dept {
      font-size: 12px;
      font-weight: 600;
      color: #3730a3;
      background: rgba(79, 70, 229, 0.08);
      border-radius: 6px;
      padding: 2px 8px;
      align-self: flex-start;
    }

    .btech-alumni-year {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty-state svg {
      width: 56px;
      height: 56px;
      stroke: #c7d2fe;
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      margin-bottom: 16px;
    }

    .empty-state p {
      font-size: 15px;
      margin: 0;
    }

    /* Back link */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13.5px;
      font-weight: 600;
      color: var(--accent);
      text-decoration: none;
      margin-bottom: 8px;
    }

    .back-link:hover { text-decoration: underline; }

    /* Page fade */
    #app-content {
      animation: fadeUpIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes fadeUpIn {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    html { overflow-y: scroll; }
    @view-transition { navigation: auto; }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <div id="navbar">
    <nav class="navbar navbar-expand-lg navbar-light" id="mainNav">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="./index.html">
          <img src="./assets/images/logo/1000371724-removebg-preview.png" alt="MMVL Logo"
            style="height:80px; width:auto; margin-right:10px;">
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu"
          aria-controls="navMenu" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"><span></span></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="team.html">Team</a></li>
            <li class="nav-item"><a class="nav-link" href="research.html">Research</a></li>
            <li class="nav-item"><a class="nav-link" href="facilities.html">Facilities</a></li>
            <li class="nav-item"><a class="nav-link" href="publications.html">Publications</a></li>
            <li class="nav-item"><a class="nav-link" href="joinus.html">Join Us</a></li>
            <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
          </ul>
        </div>
      </div>
    </nav>
  </div>

  <main id="app-content">
    <div class="container-max">

      <a href="team.html" class="back-link">
        <svg style="width:14px;height:14px;stroke:var(--accent);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;" viewBox="0 0 24 24">
          <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
        Back to Team
      </a>

      <div class="page-head">
        <h1 class="page-title">Alumni</h1>
        <div class="page-subtitle">
          Former members of Machine &amp; Medical Vision Lab (MMVL) — where are they now?
        </div>
      </div>

      <!-- PhD Alumni -->
      <div class="section-title">PhD Alumni</div>
      <div class="alumni-grid" id="phdAlumniGrid"></div>

      <!-- Masters Alumni -->
      <div class="section-title">Masters Alumni</div>
      <div class="alumni-grid" id="mastersAlumniGrid"></div>

      <!-- Project / Bachelors Alumni -->
      <div class="section-title">Project Alumni</div>
      <div class="alumni-grid" id="projectAlumniGrid"></div>

      <!-- Bachelors Students -->
      <div class="section-title">Bachelors Alumni</div>
      <div id="btechAlumniGrid"></div>

    </div>
  </main>

  <div id="footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script src="./data/team-data.js"></script>

  <script>
    const phdAlumni = [];

    const mastersAlumni = [
      { name: "Amit Kumar",              degree: "M.Tech (AI Executive)",    thesis: "Plant Disease Detection",                                  year: "2024", linkedin: "#", currentPosition: "" },
      { name: "Priyanka Srivastava",     degree: "M.Tech (AI Executive)",    thesis: "Alzheimer's Disease Detection",                           year: "2024", linkedin: "#", currentPosition: "" },
      { name: "Oindrila Ray",            degree: "M.Tech (AI Executive)",    thesis: "",                                                         year: "2025", linkedin: "#", currentPosition: "" },
      { name: "Kunal Biswas",            degree: "M.Tech (AI Executive)",    thesis: "",                                                         year: "2025", linkedin: "#", currentPosition: "" },
      { name: "Mayank Raghav",           degree: "M.Tech (AI Executive)",    thesis: "",                                                         year: "2025", linkedin: "#", currentPosition: "" },
      { name: "Mitesh Kumar",            degree: "M.Tech (DCS)",             thesis: "Novel Product Identification",                             year: "2025", linkedin: "#", currentPosition: "" },
      { name: "Ganesh Patidar",          degree: "M.Tech (DCS)",             thesis: "Federated Learning for Dermatological Image Segmentation", year: "2025", linkedin: "#", currentPosition: "" },
      { name: "Adarsh Gupta",            degree: "M.Tech (AR/VR)",           thesis: "Augmented Reality — Virtual Trial Room",                   year: "2025", linkedin: "#", currentPosition: "" },
      { name: "Ghanshyam Govind Variya", degree: "M.Tech (AR/VR Executive)", thesis: "Pelvic Fracture Segmentation",                             year: "2025", linkedin: "#", currentPosition: "" },
    ];

    const projectAlumni = [
      { name: "Ale Anwesh",           degree: "B.Tech (AI & DS)", thesis: "Plant Annotation Tool",                              year: "2024", linkedin: "#", currentPosition: "" },
      { name: "Keval",                degree: "B.Tech (CSE)",     thesis: "Ascites Detection",                                  year: "2024", linkedin: "#", currentPosition: "" },
      { name: "Khushal Damor",        degree: "B.Tech (AI & DS)", thesis: "PPGL Project",                                      year: "2024", linkedin: "#", currentPosition: "" },
      { name: "Samarth",              degree: "B.Tech (CSE)",     thesis: "ACC Tumor Detection",                                year: "2025", linkedin: "#", currentPosition: "" },
      { name: "Amey Chaya",           degree: "B.Tech (ES)",      thesis: "Adrenal Tumors",                                    year: "2025", linkedin: "#", currentPosition: "" },
      { name: "Nirmal Kumar Godara",  degree: "B.Tech (AI & DS)", thesis: "CT Multiphase Generation",                          year: "2025", linkedin: "#", currentPosition: "" },
      { name: "Darsh Patel",          degree: "B.Tech (AI & DS)", thesis: "VLM: Foundation Model for Report Summarization",    year: "2025", linkedin: "#", currentPosition: "" },
      { name: "Harsh Kumar",          degree: "B.Tech (ES)",      thesis: "RECIST Automation",                                 year: "2025", linkedin: "#", currentPosition: "" },
      { name: "Nihar Kuchankar",      degree: "B.Tech (AI & DS)", thesis: "PPGL Annotation",                                   year: "2025", linkedin: "#", currentPosition: "" },
      { name: "Patil Sanskar",        degree: "B.Tech (CSE)",     thesis: "AyurTech",                                          year: "2025", linkedin: "#", currentPosition: "" },
    ];

    const emptyState = `
      <div class="empty-state" style="grid-column:1/-1;">
        <svg viewBox="0 0 24 24">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        <p>We are waiting for our first Ph.D. Scholar, Let's see who will be the first!</p>
      </div>`;

    function renderAlumniGrid(containerId, list) {
      const el = document.getElementById(containerId);
      if (!list.length) { el.innerHTML = emptyState; return; }
      el.innerHTML = list.map(a => `
        <div class="alumni-card">
          <div class="alumni-name">${a.name}</div>
          <span class="alumni-degree">${a.degree}</span>
          ${a.thesis ? `<div class="alumni-thesis">${a.thesis}</div>` : ''}
          ${a.year ? `<div class="alumni-year">Graduated: ${a.year}</div>` : ''}
          ${a.currentPosition ? `<div class="alumni-position">${a.currentPosition}</div>` : ''}
          ${a.linkedin ? `
          <div class="alumni-icons">
            <a href="${a.linkedin}" target="_blank" aria-label="LinkedIn">
              <svg viewBox="0 0 24 24"><path d="M4.98 3.5C4.98 4.88 3.87 6 2.5 6S0 4.88 0 3.5 1.12 1 2.5 1 4.98 2.12 4.98 3.5zM.22 23.5h4.56V7.98H.22zM8.22 7.98h4.38v2.12h.06c.61-1.16 2.1-2.38 4.32-2.38 4.62 0 5.48 3.04 5.48 6.99v8.79h-4.56v-7.8c0-1.86-.03-4.25-2.59-4.25-2.59 0-2.99 2.02-2.99 4.11v7.94H8.22z"/></svg>
            </a>
          </div>` : ''}
        </div>
      `).join('');
    }

    renderAlumniGrid('phdAlumniGrid', phdAlumni);
    renderAlumniGrid('mastersAlumniGrid', mastersAlumni);
    renderAlumniGrid('projectAlumniGrid', projectAlumni);

    // Render btech students from team-data.js
    (function renderBtechAlumni() {
      const el = document.getElementById('btechAlumniGrid');
      if (!btechStudents || !btechStudents.length) { el.innerHTML = ''; return; }
      el.innerHTML = `
        <div class="btech-alumni-grid">
          ${btechStudents.map(s => `
            <div class="btech-alumni-cell">
              <span class="btech-alumni-name">${s.name}</span>
              ${s.dept ? `<span class="btech-alumni-dept">${s.dept}</span>` : ''}
              ${s.passedYear ? `<span class="btech-alumni-year">Passed: ${s.passedYear}</span>` : ''}
            </div>
          `).join('')}
        </div>`;
    })();
  </script>

  <script>
    fetch("footer.html")
      .then(res => res.text())
      .then(data => document.getElementById("footer").innerHTML = data);
  </script>

  <script src="./assets/js/scroll-reveal.js"></script>
  <script src="./assets/js/spa.js"></script>
</body>

</html>
