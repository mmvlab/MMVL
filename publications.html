<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MMVL Lab — Publications</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="./assets/css/navbar.css">
  <link rel="stylesheet" href="./assets/css/footer.css">

  <style>
    :root{
      --bg:#f1f3f6;
      --card:#ffffff;
      --text:#111827;
      --muted:#4b5563;
      --accent:#0e38f1;
      --border:#d1d5db;
    }

    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:Inter,system-ui,Arial;
      line-height:1.55;
    }

    .container-publications{
      max-width:75%;
      margin:40px auto;
      margin-top: 72px;
      padding:20px;
    }

    a{
      color:var(--accent);
      font-weight:600;
      text-decoration:none;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:16px;
      margin-bottom:22px;
    }

    .lab-title{
      font-weight:800;
      font-size:22px;
    }

    .sub-title{
      color:var(--muted);
      font-size:14px;
      margin-top:4px;
    }

    .filters{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      align-items:center;
      background:var(--card);
      border:1px solid var(--border);
      border-radius:14px;
      padding:14px;
      box-shadow:0 8px 22px rgba(0,0,0,0.06);
      margin-bottom:22px;
    }

    .input, .select{
      border:1px solid var(--border);
      border-radius:10px;
      padding:10px 12px;
      font-size:14px;
      background:#fff;
      outline:none;
      min-width:200px;
    }

    .input:focus, .select:focus{
      border-color:rgba(14,56,241,0.65);
      box-shadow:0 0 0 3px rgba(14,56,241,0.12);
    }

    .chip{
      padding:8px 12px;
      border-radius:999px;
      border:1px solid var(--border);
      background:#fff;
      font-size:13px;
      cursor:pointer;
      transition:0.2s ease;
      user-select:none;
    }

    .chip:hover{
      border-color:rgba(14,56,241,0.6);
      background:rgba(14,56,241,0.06);
    }

    .chip.active{
      border-color:rgba(14,56,241,0.75);
      background:rgba(14,56,241,0.12);
      color:var(--accent);
      font-weight:700;
    }

    .year-block{
      margin-top:24px;
    }

    .year-title{
      font-size:18px;
      font-weight:800;
      margin-bottom:12px;
      display:flex;
      align-items:center;
      gap:10px;
    }

    .year-title span{
      background:rgba(14,56,241,0.08);
      color:var(--accent);
      padding:5px 10px;
      border-radius:999px;
      font-size:13px;
      font-weight:700;
    }

    .pub{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:14px;
      padding:16px 18px;
      box-shadow:0 8px 22px rgba(0,0,0,0.06);
      margin-bottom:14px;
      transition:transform .2s ease, box-shadow .2s ease, border-color .2s ease;
    }

    .pub:hover{
      transform:translateY(-4px);
      box-shadow:0 14px 32px rgba(14,56,241,0.12);
      border-color:rgba(14,56,241,0.55);
    }

    .pub-title{
      font-weight:800;
      font-size:16px;
      margin-bottom:6px;
    }

    .pub-authors{
      color:var(--muted);
      font-size:14px;
      margin-bottom:6px;
    }

    .pub-venue{
      font-size:14px;
      color:#1f2937;
      font-weight:600;
    }

    .pub-links{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:10px;
    }

    .btn-link{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:7px 10px;
      border-radius:10px;
      border:1px solid var(--border);
      background:#fff;
      font-size:13px;
      font-weight:700;
      color:var(--text);
      transition:0.2s ease;
    }

    .btn-link:hover{
      border-color:rgba(14,56,241,0.6);
      background:rgba(14,56,241,0.06);
      color:var(--accent);
      text-decoration:none;
    }

    .icon{
      width:16px;
      height:16px;
      fill:none;
      stroke:currentColor;
      stroke-width:1.7;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    .note{
      margin-top:26px;
      color:var(--muted);
      font-size:13px;
      text-align:center;
    }

    .hidden{
      display:none !important;
    }

    @media(max-width:600px){
      .topbar{ flex-direction:column; align-items:flex-start; }
      .input, .select{ width:100%; min-width:unset; }
      .filters{ align-items:stretch; }
    }
  </style>
</head>

<body>
  <div id="navbar"></div>

  <div class="container-publications">

    <!-- Header -->
    <div class="topbar">
      <div>
        <div class="lab-title">Machine & Medical Vision Lab</div>
        <div class="sub-title">Publications · Selected peer-reviewed papers and preprints</div>
      </div>
    
    </div>

    <!-- Filters -->
    <div class="filters">
      <input id="searchInput" class="input" type="text" placeholder="Search title / author / venue..." />

      <select id="yearFilter" class="select">
        <option value="">All Years</option>
        <option value="2025">2025</option>
        <option value="2024">2024</option>
        <option value="2023">2023</option>
      </select>

      <select id="typeFilter" class="select">
        <option value="">All Types</option>
        <option value="Conference">Conference</option>
        <option value="Journal">Journal</option>
        <option value="Workshop">Workshop</option>
        <option value="Preprint">Preprint</option>
      </select>

      <!-- Topics -->
      <div class="chip" data-topic="Computer Vision">Computer Vision</div>
      <div class="chip" data-topic="Medical Imaging">Medical Imaging</div>
      <div class="chip" data-topic="Multimodal">Multimodal</div>
      <div class="chip" data-topic="Pose / Posture">Pose / Posture</div>
    </div>

    <!-- Publications -->
<!-- Publications -->
<div id="publicationsContainer"></div>


    <div class="note">
      For a complete list, please visit the lab Google Scholar profile.
    </div>

  </div>

  <!-- ICONS -->
  <svg style="display:none">
    <symbol id="icon-pdf" viewBox="0 0 24 24">
      <path d="M6 2h9l5 5v15a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2z"/>
      <path d="M15 2v6h6"/>
      <path d="M7 15h2a2 2 0 0 0 0-4H7v8"/>
      <path d="M13 11h-2v8h2a3 3 0 0 0 0-8z"/>
      <path d="M19 11h-2v8m2-4h-2"/>
    </symbol>

    <symbol id="icon-link" viewBox="0 0 24 24">
      <path d="M10 13a5 5 0 0 1 0-7l1-1a5 5 0 0 1 7 7l-1 1"/>
      <path d="M14 11a5 5 0 0 1 0 7l-1 1a5 5 0 0 1-7-7l1-1"/>
    </symbol>

    <symbol id="icon-code" viewBox="0 0 24 24">
      <path d="M9 18l-6-6 6-6"/>
      <path d="M15 6l6 6-6 6"/>
    </symbol>

    <symbol id="icon-cite" viewBox="0 0 24 24">
      <path d="M7 7h4v4H7z"/>
      <path d="M13 7h4v4h-4z"/>
      <path d="M7 13h4v4H7z"/>
      <path d="M13 13h4v4h-4z"/>
    </symbol>
  </svg>

  <div id="footer"></div>

  <script src="./data/publications-data.js"></script>
<script src="./loaders/publications-load.js"></script>

<script>
(function(){
  const searchInput = document.getElementById("searchInput");
  const yearFilter = document.getElementById("yearFilter");
  const typeFilter = document.getElementById("typeFilter");
  const chips = document.querySelectorAll(".chip");
  const pubs = document.querySelectorAll(".pub");
  const yearBlocks = document.querySelectorAll(".year-block");

  let activeTopics = new Set();

  function normalize(str){
    return (str || "").toLowerCase().trim();
  }

  function applyFilters(){
    const query = normalize(searchInput.value);
    const selectedYear = yearFilter.value;
    const selectedType = typeFilter.value;

    pubs.forEach(pub => {
      const year = pub.dataset.year;
      const type = pub.dataset.type;
      const topics = (pub.dataset.topics || "").split(",").map(t => t.trim());

      const text = normalize(pub.innerText);

      const matchesSearch = query === "" || text.includes(query);
      const matchesYear = selectedYear === "" || year === selectedYear;
      const matchesType = selectedType === "" || type === selectedType;

      const matchesTopics =
        activeTopics.size === 0 ||
        topics.some(t => activeTopics.has(t));

      const show = matchesSearch && matchesYear && matchesType && matchesTopics;

      pub.classList.toggle("hidden", !show);
    });

    // Hide year blocks if none of their pubs are visible
    yearBlocks.forEach(block => {
      const visiblePubs = block.querySelectorAll(".pub:not(.hidden)");
      block.classList.toggle("hidden", visiblePubs.length === 0);
    });
  }

  searchInput.addEventListener("input", applyFilters);
  yearFilter.addEventListener("change", applyFilters);
  typeFilter.addEventListener("change", applyFilters);

  chips.forEach(chip => {
    chip.addEventListener("click", () => {
      const topic = chip.dataset.topic;
      if(activeTopics.has(topic)){
        activeTopics.delete(topic);
        chip.classList.remove("active");
      } else {
        activeTopics.add(topic);
        chip.classList.add("active");
      }
      applyFilters();
    });
  });

  applyFilters();
})();

  fetch("navbar.html")
    .then(res => res.text())
    .then(data => document.getElementById("navbar").innerHTML = data);

  fetch("footer.html")
    .then(res => res.text())
    .then(data => document.getElementById("footer").innerHTML = data);
</script>

<script>
  fetch("footer.html")
    .then(res => res.text())
    .then(data => document.getElementById("footer").innerHTML = data);
</script>

</body>
</html>
